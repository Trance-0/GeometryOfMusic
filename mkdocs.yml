site_name: Geometry of Music
site_description: >-
  Interactive 3D applets for studying the geometry of chord space, voice
  leading, and other structures in music theory.
site_url: https://trance-0.github.io/GeometryOfMusic/
repo_url: https://github.com/Trance-0/GeometryOfMusic
repo_name: Trance-0/GeometryOfMusic
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - Usage: usage.md
  - Experiments:
      - Overview: experiment/index.md
      - Torus (ordered dyads): experiment/torus-dyad.md
      - Tonnetz (triads): experiment/tonnetz.md
      - Dyad orbifold (Möbius): experiment/dyad-orbifold.md
      - Triad orbifold: experiment/triad-orbifold.md
      - Voice-leading lattice: experiment/voice-leading.md
      - Harmonic functions (Schoenberg): experiment/schoenberg-regions.md
  - Versions:
      - Overview: versions/index.md
      - 0.0.1: versions/0.0.1.md
      - 0.0.2: versions/0.0.2.md
      - 0.0.3: versions/0.0.3.md
      - 0.0.4: versions/0.0.4.md
      - 0.0.5: versions/0.0.5.md
      - 0.0.6: versions/0.0.6.md
  - Deployment:
      - Cloudflare Pages (app): deployment/cloudflare-pages.md
      - Vercel (app): deployment/vercel.md
      - GitHub Pages (docs site): deployment/github-pages-docs.md
  - Roadmap: TODO.md
  - Agent checklist: LLM_CHECK.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

strict: true
